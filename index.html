<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap"
      rel="stylesheet"
    />
    <script src="js/script.js" defer></script>
  </head>
  <body>
    <header>
      <section class="logo-titulo">
        <img src="images/logo.png" alt="logo de mundo muñecas" />
        <h1>MundoMuñecas</h1>
      </section>
      <section class="contacto">
        <img src="images/telefono-1.png" alt="telefono de contacto" />
        <p>Llámanos al: 222-222</p>
      </section>
    </header>

    <nav>
      <ul>
        <li><a href="">Inicio</a></li>
        <li><a href="">Nuevos</a></li>
        <li><a href="">Nosotros</a></li>
        <li><a href="">Blog</a></li>
        <li><a href="">Contacto</a></li>
      </ul>

      <section class="buscar">
        <input type="text" placeholder="Buscar Muñecas" />
        <button>Buscar</button>
      </section>

      <section class="carrito">
        <h3 id="cantidad">5</h3>
        <img src="images/carrito-1.png" alt="carrito de compras" />
      </section>
    </nav>

    <main>
      <section class="stock-filtro">
        <p>157 muñecas, orden: <span>Más vendidas</span></p>
        <select class="filtro" name="filtro" id="filtro">
          <option value="Más vendidas">Más vendidas</option>
          <option value="Precio">Precio</option>
        </select>
      </section>

      <section class="tarjetas">
        <figure class="tarjeta">
          <img src="images/mexicana.jpg" alt="muñeca mexicana" />
          <p>Muñeca mexicana</p>
          <button>
            <img
              class="agregar-carrito"
              src="images/carrito-2.png"
              alt="imagen carrito"
            />
          </button>
        </figure>
        <figure class="tarjeta">
          <img src="images/china.jpg" alt="muñeca china" />
          <p>Muñeca china</p>
          <button>
            <img
              class="agregar-carrito"
              src="images/carrito-2.png"
              alt="imagen carrito"
            />
          </button>
        </figure>
        <figure class="tarjeta">
          <img src="images/africana.jpg" alt="muñeca africana" />
          <p>Muñeca africana</p>
          <button>
            <img
              class="agregar-carrito"
              src="images/carrito-2.png"
              alt="imagen carrito"
            />
          </button>
        </figure>
        <figure class="tarjeta">
          <img src="images/holandesa.jpg" alt="muñeca holandesa" />
          <p>Muñeca holandesa</p>
          <button>
            <img
              class="agregar-carrito"
              src="images/carrito-2.png"
              alt="imagen carrito"
            />
          </button>
        </figure>
      </section>
    </main>

    <footer>
      <section class="logo-footer">
        <img src="images/logo.png" alt="logo de mundo muñecas" />
      </section>
      <section class="rrss">
        <img src="images/info.png" alt="" />
        <img src="images/email.png" alt="" />
        <img src="images/telefono-2.png" alt="" />
        <img id="preguntas" src="images/preguntas.png" alt="" />
      </section>
    </footer>
  </body>
</html>
